---
- name: Install NFS client
  apt:
    name: nfs-common
    state: present
    update_cache: yes

- name: Create mount points
  file:
    path: "/mnt/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ nfs_mounts | map(attribute='name') | list }}"

- name: Mount NFS shares
  mount:
    path: "/mnt/{{ item.name }}"
    src: "{{ nfs_server }}:/NAS/{{ item.name }}"
    fstype: nfs
    opts: "{{ nfs_options | join(',') }}"
    state: mounted
  loop: "{{ nfs_mounts }}"
